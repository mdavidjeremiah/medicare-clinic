{% extends 'clinic/base.html' %}
{% block title %}Login – MediCare Clinic{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:440px;">
    <div class="auth-header">
      <div class="brand">Medi<span>Care</span></div>
      <p>Welcome back — sign in to your account</p>
    </div>
    <div class="auth-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label"><i class="bi bi-person"></i> Username</label>
          <input type="text" name="username" required placeholder="Enter your username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="bi bi-lock"></i> Password</label>
          <input type="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:.8rem;font-size:1rem;border-radius:var(--radius);">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
      <p style="text-align:center;margin-top:1.25rem;color:var(--muted);font-size:.88rem;">
        New patient? <a href="{% url 'register' %}" style="font-weight:600;">Create an account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
